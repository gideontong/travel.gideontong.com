<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IHG Traveler Card Comparison Dashboard</title>

<style>
* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f7fa;
}

body {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    padding: 12px 20px;
    background: white;
    border-bottom: 1px solid #ddd;
    flex-shrink: 0;
}

.header h1 {
    margin: 0;
    font-size: 1.25rem;
}

.header p {
    margin: 4px 0 0;
    color: #666;
    font-size: 0.9rem;
}

.grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 8px;
    overflow: hidden;
}

.panel {
    display: flex;
    flex-direction: column;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    min-height: 0;
}

.panel-header {
    padding: 10px 12px;
    background: #f8f9fb;
    border-bottom: 1px solid #ddd;
    font-weight: 600;
    font-size: 14px;
    flex-shrink: 0;
}

.panel iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: white;
}

@media (max-width: 1400px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 900px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="header">
    <h1>IHG One Rewards Traveler Card Comparison</h1>
    <p>Side-by-side comparison of all generated webpages.</p>
</div>

<div class="grid">

    <div class="panel">
        <div class="panel-header">Claude Sonnet 4.6 Low</div>
        <iframe src="/cards/chase/ihg/traveler/claude/"></iframe>
    </div>

    <div class="panel">
        <div class="panel-header">DeepSeek DeepThink</div>
        <iframe src="/cards/chase/ihg/traveler/deepseek/deepthink/"></iframe>
    </div>

    <div class="panel">
        <div class="panel-header">DeepSeek Instant</div>
        <iframe src="/cards/chase/ihg/traveler/deepseek/instant/"></iframe>
    </div>

    <div class="panel">
        <div class="panel-header">Gemini 3.1 Pro Public</div>
        <iframe src="/cards/chase/ihg/traveler/gemini/3.1-pro-public/"></iframe>
    </div>

    <div class="panel">
        <div class="panel-header">Gemini 3.1 Pro Internal</div>
        <iframe src="/cards/chase/ihg/traveler/gemini/internal/"></iframe>
    </div>

    <div class="panel">
        <div class="panel-header">Meta AI</div>
        <iframe src="/cards/chase/ihg/traveler/meta"></iframe>
    </div>

</div>

</body>
</html>
