<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light dark" />
<title>IHG Traveler Card — Model Comparison</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-2: #f6f7f9;
    --text: #0f1115;
    --text-secondary: #5f6369;
    --border: #e4e6ea;
    --tab-bg: #eef0f3;
    --tab-hover: #e5e8ec;
    --tab-active-bg: #0a84ff;
    --tab-active-text: #ffffff;
    --shadow: 0 1px 2px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0d11;
      --bg-2: #0a0c0f;
      --text: #e8eaed;
      --text-secondary: #9aa0a6;
      --border: #1c2026;
      --tab-bg: #151922;
      --tab-hover: #1c2230;
      --tab-active-bg: #0a84ff;
      --tab-active-text: #ffffff;
      --shadow: 0 1px 2px rgba(0,0,0,.5), 0 8px 24px rgba(0,0,0,.35);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .app-top {
    position: sticky;
    top: 0;
    z-index: 20;
    background: color-mix(in oklab, var(--bg) 92%, transparent);
    backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px 8px;
    min-height: 48px;
  }
  h1 {
    margin: 0;
    font-size: clamp(15px, 2.2vw, 17px);
    font-weight: 650;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1 1 auto;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    flex: 0 0 auto;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 550;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: transform .08s ease, background .15s ease, border-color .15s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { background: var(--tab-hover); }
  .btn:active { transform: translateY(1px); }
  .btn svg { display: block; }

  .tabs-wrap {
    padding: 0 8px 10px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding: 2px;
    scroll-snap-type: x proximity;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    scroll-snap-align: start;
    padding: 9px 14px;
    border-radius: 999px;
    background: var(--tab-bg);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    font-size: 13.5px;
    font-weight: 550;
    letter-spacing: .01em;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s ease, color .15s ease, transform .08s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .tab:hover { background: var(--tab-hover); color: var(--text); }
  .tab:active { transform: translateY(1px); }
  .tab:focus-visible {
    outline: 2px solid color-mix(in oklab, var(--tab-active-bg) 70%, white);
    outline-offset: 2px;
  }
  .tab.active {
    background: var(--tab-active-bg);
    color: var(--tab-active-text);
    border-color: transparent;
    box-shadow: var(--shadow);
  }

  .viewer {
    position: relative;
    flex: 1 1 auto;
    background: var(--bg-2);
    overflow: hidden;
  }
  .frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: var(--bg);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity .18s ease;
  }
  .frame.active {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    z-index: 1;
  }

  .sr-only {
    position: absolute !important;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }

  @media (max-width: 520px) {
    .top-bar { flex-wrap: wrap; padding-bottom: 6px; }
    h1 { flex-basis: 100%; order: 1; }
    .toolbar { order: 2; margin-left: auto; }
    .btn { padding: 8px 10px; font-size: 13px; }
    .tab { padding: 8px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
  <div class="app-top">
    <div class="top-bar">
      <h1>IHG Traveler Card — Model Comparison</h1>
      <div class="toolbar" role="toolbar" aria-label="Page actions">
        <span id="current-label" class="sr-only" aria-live="polite">Claude Sonnet 4.6 Low</span>
        <button id="openBtn" class="btn" type="button" title="Open current in new tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Open
        </button>
        <button id="reloadBtn" class="btn" type="button" title="Reload current frame">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Reload
        </button>
      </div>
    </div>
    <div class="tabs-wrap">
      <nav class="tabs" id="tabs" role="tablist" aria-label="Model versions">
        <button class="tab active" role="tab" id="tab-0" aria-controls="frame-0" aria-selected="true" data-index="0" tabindex="0">Claude Sonnet 4.6 Low</button>
        <button class="tab" role="tab" id="tab-1" aria-controls="frame-1" aria-selected="false" data-index="1" tabindex="-1">DeepSeek DeepThink</button>
        <button class="tab" role="tab" id="tab-2" aria-controls="frame-2" aria-selected="false" data-index="2" tabindex="-1">DeepSeek Instant</button>
        <button class="tab" role="tab" id="tab-3" aria-controls="frame-3" aria-selected="false" data-index="3" tabindex="-1">Gemini 3.1 Pro Public</button>
        <button class="tab" role="tab" id="tab-4" aria-controls="frame-4" aria-selected="false" data-index="4" tabindex="-1">Gemini 3.1 Pro Internal</button>
        <button class="tab" role="tab" id="tab-5" aria-controls="frame-5" aria-selected="false" data-index="5" tabindex="-1">Meta AI</button>
      </nav>
    </div>
  </div>

  <main class="viewer" id="viewer">
    <iframe id="frame-0" class="frame active" src="/cards/chase/ihg/traveler/claude/" title="Claude Sonnet 4.6 Low" loading="eager" referrerpolicy="no-referrer-when-downgrade"></iframe>
    <iframe id="frame-1" class="frame" src="/cards/chase/ihg/traveler/deepseek/deepthink/" title="DeepSeek DeepThink" loading="eager" referrerpolicy="no-referrer-when-downgrade"></iframe>
    <iframe id="frame-2" class="frame" src="/cards/chase/ihg/traveler/deepseek/instant/" title="DeepSeek Instant" loading="eager" referrerpolicy="no-referrer-when-downgrade"></iframe>
    <iframe id="frame-3" class="frame" src="/cards/chase/ihg/traveler/gemini/3.1-pro-public/" title="Gemini 3.1 Pro Public" loading="eager" referrerpolicy="no-referrer-when-downgrade"></iframe>
    <iframe id="frame-4" class="frame" src="/cards/chase/ihg/traveler/gemini/internal/" title="Gemini 3.1 Pro Internal" loading="eager" referrerpolicy="no-referrer-when-downgrade"></iframe>
    <iframe id="frame-5" class="frame" src="/cards/chase/ihg/traveler/meta" title="Meta AI" loading="eager" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </main>

<script>
  (function() {
    const TABS = [
      { label: "Claude Sonnet 4.6 Low", url: "/cards/chase/ihg/traveler/claude/" },
      { label: "DeepSeek DeepThink", url: "/cards/chase/ihg/traveler/deepseek/deepthink/" },
      { label: "DeepSeek Instant", url: "/cards/chase/ihg/traveler/deepseek/instant/" },
      { label: "Gemini 3.1 Pro Public", url: "/cards/chase/ihg/traveler/gemini/3.1-pro-public/" },
      { label: "Gemini 3.1 Pro Internal", url: "/cards/chase/ihg/traveler/gemini/internal/" },
      { label: "Meta AI", url: "/cards/chase/ihg/traveler/meta" }
    ];

    const tabButtons = Array.from(document.querySelectorAll('.tab'));
    const frames = Array.from(document.querySelectorAll('.frame'));
    const openBtn = document.getElementById('openBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const currentLabel = document.getElementById('current-label');

    let current = 0;

    function activate(index, opts = {}) {
      const { focus = true, scroll = true } = opts;
      if (index < 0 || index >= TABS.length) return;
      current = index;

      tabButtons.forEach((btn, i) => {
        const isActive = i === index;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
        btn.tabIndex = isActive ? 0 : -1;
      });

      frames.forEach((f, i) => {
        f.classList.toggle('active', i === index);
      });

      currentLabel.textContent = TABS[index].label;

      if (scroll) {
        tabButtons[index].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
      if (focus) {
        tabButtons[index].focus({ preventScroll: true });
      }

      // Update URL hash for deep linking (no reload)
      try {
        history.replaceState(null, '', '#' + TABS[index].url);
      } catch(e) {}
    }

    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        activate(Number(btn.dataset.index), { focus: false });
      });
    });

    openBtn.addEventListener('click', () => {
      const url = TABS[current].url;
      window.open(url, '_blank', 'noopener,noreferrer');
    });

    reloadBtn.addEventListener('click', () => {
      const frame = frames[current];
      // Force reload without cache-busting query to keep URL clean
      try {
        frame.contentWindow.location.reload();
      } catch (e) {
        // Cross-origin fallback
        frame.src = TABS[current].url;
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      const tag = document.activeElement && document.activeElement.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || e.metaKey || e.ctrlKey || e.altKey) return;

      if (e.key === 'ArrowRight') {
        e.preventDefault();
        activate((current + 1) % TABS.length);
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        activate((current - 1 + TABS.length) % TABS.length);
      } else if (e.key === 'Home') {
        e.preventDefault();
        activate(0);
      } else if (e.key === 'End') {
        e.preventDefault();
        activate(TABS.length - 1);
      } else if (/^[1-6]$/.test(e.key)) {
        const idx = Number(e.key) - 1;
        if (idx < TABS.length) {
          e.preventDefault();
          activate(idx);
        }
      }
    });

    // Activate from hash on load
    function initFromHash() {
      const hash = decodeURIComponent(location.hash.replace(/^#/, ''));
      if (!hash) return;
      const idx = TABS.findIndex(t => t.url === hash);
      if (idx >= 0) activate(idx, { focus: false, scroll: true });
    }
    initFromHash();

    // Ensure first paint shows correct label
    currentLabel.textContent = TABS[0].label;
  })();
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
