<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hong Kong to Frankfurt in Business Class</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      :root {
        --bg: #fcfcfd;
        --bg-elev: #ffffff;
        --text: #09090b;
        --text-secondary: #71717a;
        --text-tertiary: #a1a1aa;
        --border: #e4e4e7;
        --border-hover: #d4d4d8;
        --accent: #18181b;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.05);
        --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.08);
        --featured: #2563eb;
        --featured-bg: #eff6ff;
        --featured-border: rgba(37, 99, 235, 0.2);
        --radius: 16px;
        --transition: 200ms cubic-bezier(0.2, 0, 0, 1);
      }

      [data-theme="dark"] {
        --bg: #09090b;
        --bg-elev: #121215;
        --text: #fafafa;
        --text-secondary: #a1a1aa;
        --text-tertiary: #71717a;
        --border: #232326;
        --border-hover: #2e2e32;
        --accent: #fafafa;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.5);
        --featured: #60a5fa;
        --featured-bg: rgba(37, 99, 235, 0.12);
        --featured-border: rgba(96, 165, 250, 0.25);
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --bg: #09090b;
          --bg-elev: #121215;
          --text: #fafafa;
          --text-secondary: #a1a1aa;
          --text-tertiary: #71717a;
          --border: #232326;
          --border-hover: #2e2e32;
          --accent: #fafafa;
          --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
          --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3);
          --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.5);
          --featured: #60a5fa;
          --featured-bg: rgba(37, 99, 235, 0.12);
          --featured-border: rgba(96, 165, 250, 0.25);
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.5;
        transition: background-color var(--transition), color var(--transition);
        position: relative;
      }

      .bg-gradient {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: radial-gradient(800px circle at 50% -10%, rgba(37, 99, 235, 0.08), transparent 50%),
                    radial-gradient(600px circle at 85% 5%, rgba(124, 58, 237, 0.06), transparent 50%);
        pointer-events: none;
      }

      [data-theme="dark"] .bg-gradient {
        opacity: 0.7;
        background: radial-gradient(800px circle at 50% -10%, rgba(37, 99, 235, 0.12), transparent 50%),
                    radial-gradient(600px circle at 85% 5%, rgba(124, 58, 237, 0.08), transparent 50%);
      }

      .wrap {
        max-width: 800px;
        margin: 0 auto;
        padding: 48px 24px 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 40px;
        animation: fadeIn 0.6s ease-out;
      }

      .header-content h1 {
        font-size: clamp(28px, 5vw, 40px);
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 8px;
        margin-top: 24px;
      }

      .header-content p {
        color: var(--text-secondary);
        font-size: 16px;
        font-weight: 400;
      }

      .nav-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg-elev);
        color: var(--text);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all var(--transition);
        box-shadow: var(--shadow-sm);
      }

      .nav-btn:hover {
        border-color: var(--border-hover);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .theme-toggle {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg-elev);
        color: var(--text-secondary);
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: all var(--transition);
        box-shadow: var(--shadow-sm);
      }

      .theme-toggle:hover {
        border-color: var(--border-hover);
        color: var(--text);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
      }

      .map-container {
        width: 100%;
        height: 400px;
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        margin-bottom: 40px;
        animation: fadeIn 0.6s ease-out 0.1s both;
        background: var(--bg-elev);
      }

      .section-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 20px;
        color: var(--text);
        animation: fadeIn 0.6s ease-out 0.2s both;
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 40px;
      }

      .card {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 22px;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        text-decoration: none;
        color: inherit;
        transition: all var(--transition);
        box-shadow: var(--shadow-sm);
        animation: fadeUp 0.5s ease-out both;
        overflow: hidden;
      }

      .card:hover {
        border-color: var(--border-hover);
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
      }

      .card-left {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        min-width: 0;
        flex: 1;
      }

      .icon-wrap {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        display: grid;
        place-items: center;
        flex-shrink: 0;
        color: var(--text-secondary);
      }

      .card-content {
        min-width: 0;
        flex: 1;
      }

      .card-title {
        font-size: 16px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .card-details {
        font-size: 14px;
        color: var(--text-secondary);
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 8px;
      }

      .card-details div strong {
        color: var(--text);
        font-weight: 500;
      }

      .badge {
        display: inline-flex;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 500;
        background: var(--featured-bg);
        color: var(--featured);
        border: 1px solid var(--featured-border);
        border-radius: 999px;
      }

      .badge-no {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border);
      }

      .badge-alliance {
        background: var(--bg-elev);
        color: var(--text);
        border: 1px solid var(--border-hover);
      }
      
      .badge-avios {
        background: rgba(124, 58, 237, 0.1);
        color: #7c3aed;
        border: 1px solid rgba(124, 58, 237, 0.2);
      }
      
      .badge-partner {
        background: rgba(14, 165, 233, 0.1);
        color: #0ea5e9;
        border: 1px solid rgba(14, 165, 233, 0.2);
        font-size: 10px;
        padding: 1px 6px;
      }
      
      .partner-badges {
        display: flex;
        gap: 4px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }

      .card-arrow {
        flex-shrink: 0;
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        color: var(--text-tertiary);
        transition: all var(--transition);
      }

      .card:hover .card-arrow {
        background: var(--bg);
        color: var(--text);
      }

      .card:hover .card-arrow svg {
        transform: translateX(2px) scale(1.1);
      }

      .flight-path {
        cursor: pointer;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 600px) {
        .wrap { padding: 32px 16px 16px; }
        .card-details { grid-template-columns: 1fr; }
        .card-arrow { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="bg-gradient"></div>
    <div class="wrap">
      <div class="top-bar">
        <a href="/" class="nav-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Return to Main
        </a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
          </svg>
        </button>
      </div>

      <header>
        <div class="header-content">
          <h1>Hong Kong to Frankfurt in Business Class</h1>
          <p>Our business class flight options on our way to Frankfurt.</p>
        </div>
      </header>

      <div id="map" class="map-container"></div>

      <h2 class="section-title">Nonstop Airlines</h2>
      <div class="list" id="nonstop-list">
        <!-- Rendered by JS -->
      </div>

      <h2 class="section-title">Single Stop Airlines</h2>
      <div class="list" id="singlestop-list">
        <!-- Rendered by JS -->
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
      // Theme toggling
      const themeToggle = document.getElementById('themeToggle');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
      
      let currentTheme = localStorage.getItem('theme');
      if (!currentTheme) {
        currentTheme = prefersDark.matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', currentTheme);

      let tileLayer;
      function getTileUrl(theme) {
        return theme === 'dark' 
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
          : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
      }

      themeToggle.addEventListener('click', () => {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('theme', currentTheme);
        if (tileLayer) {
          tileLayer.setUrl(getTileUrl(currentTheme));
        }
      });

      // Data
      const airlines = [
        { name: 'Cathay Pacific', type: 'nonstop', route: 'HKG - FRA', config: '1-2-1', bestAircraft: '777-300ER (Aria Suite)', product: 'Aria Suite / Business Class', doors: true, path: [[22.3080, 113.9185], [50.0379, 8.5622]], domain: 'cathaypacific.com', alliance: 'Oneworld', partners: ['Amex', 'Bilt', 'Capital One', 'Citi'] },
        { name: 'Lufthansa', type: 'nonstop', route: 'HKG - FRA', config: '1-2-1 / 1-1-1', bestAircraft: 'A350-900 / 787-9', product: 'Allegris', doors: true, path: [[22.3080, 113.9185], [50.0379, 8.5622]], domain: 'lufthansa.com', alliance: 'Star Alliance', partners: ['Bilt'] },
        { name: 'Air China', type: 'singlestop', route: 'HKG - PEK - FRA & HKG - TFU - FRA', config: '1-2-1', bestAircraft: 'A350-900', product: 'Capital Pavilion', doors: false, path: [[22.3080, 113.9185], [40.0799, 116.6031], [50.0379, 8.5622]], domain: 'airchina.com', alliance: 'Star Alliance', partners: [] },
        { name: 'Air France', type: 'singlestop', route: 'HKG - CDG - FRA', config: '1-2-1', bestAircraft: '777-300ER / A350-900 (New)', product: 'Business Class', doors: true, path: [[22.3080, 113.9185], [49.0097, 2.5479], [50.0379, 8.5622]], domain: 'airfrance.com', alliance: 'SkyTeam', partners: ['Amex', 'Bilt', 'Capital One', 'Chase', 'Citi'] },
        { name: 'Asiana', type: 'singlestop', route: 'HKG - ICN - FRA', config: '1-2-1', bestAircraft: 'A350-900', product: 'Business Smartium', doors: false, path: [[22.3080, 113.9185], [37.4602, 126.4407], [50.0379, 8.5622]], domain: 'flyasiana.com', alliance: 'Star Alliance', partners: [] },
        { name: 'China Airlines', type: 'singlestop', route: 'HKG - TPE - FRA', config: '1-2-1', bestAircraft: 'A350-900 / 777-300ER', product: 'Premium Business Class', doors: false, path: [[22.3080, 113.9185], [25.0797, 121.2342], [50.0379, 8.5622]], domain: 'china-airlines.com', alliance: 'SkyTeam', partners: [] },
        { name: 'China Eastern', type: 'singlestop', route: 'HKG - PVG - FRA', config: '1-2-1', bestAircraft: 'A350-900 / 787-9', product: 'Business Class', doors: true, path: [[22.3080, 113.9185], [31.1443, 121.8083], [50.0379, 8.5622]], domain: 'ceair.com', alliance: 'SkyTeam', partners: [] },
        { name: 'Emirates', type: 'singlestop', route: 'HKG - DXB - FRA', config: '1-2-1 / 2-3-2', bestAircraft: 'A380', product: 'Business Class', doors: false, path: [[22.3080, 113.9185], [25.2532, 55.3657], [50.0379, 8.5622]], domain: 'emirates.com', alliance: 'Independent', partners: ['Amex', 'Bilt', 'Capital One', 'Chase', 'Citi'] },
        { name: 'Etihad', type: 'singlestop', route: 'HKG - AUH - FRA', config: '1-2-1', bestAircraft: 'A350-1000 / 787-9', product: 'Business Studio', doors: true, path: [[22.3080, 113.9185], [24.4330, 54.6511], [50.0379, 8.5622]], domain: 'etihad.com', alliance: 'Independent', partners: ['Amex', 'Capital One', 'Citi'] },
        { name: 'Finnair', type: 'singlestop', route: 'HKG - HEL - FRA', config: '1-2-1', bestAircraft: 'A350-900', product: 'AirLounge', doors: false, path: [[22.3080, 113.9185], [60.3172, 24.9633], [50.0379, 8.5622]], domain: 'finnair.com', alliance: 'Oneworld', avios: true, partners: ['Capital One'] },
        { name: 'KLM', type: 'singlestop', route: 'HKG - AMS - FRA', config: '1-2-1', bestAircraft: '777-300ER / 787-10', product: 'World Business Class', doors: true, path: [[22.3080, 113.9185], [52.3081, 4.7642], [50.0379, 8.5622]], domain: 'klm.com', alliance: 'SkyTeam', partners: ['Amex', 'Bilt', 'Capital One', 'Chase', 'Citi'] },
        { name: 'Korean Air', type: 'singlestop', route: 'HKG - ICN - FRA', config: '1-2-1', bestAircraft: '787-10 / 747-8', product: 'Prestige Class', doors: true, path: [[22.3080, 113.9185], [37.4602, 126.4407], [50.0379, 8.5622]], domain: 'koreanair.com', alliance: 'SkyTeam', partners: [] },
        { name: 'Qatar Airways', type: 'singlestop', route: 'HKG - DOH - FRA', config: '1-2-1', bestAircraft: 'A350-1000 / 777-300ER', product: 'Qsuite', doors: true, path: [[22.3080, 113.9185], [25.2731, 51.6080], [50.0379, 8.5622]], domain: 'qatarairways.com', alliance: 'Oneworld', avios: true, partners: ['Amex', 'Citi'] },
        { name: 'Singapore Airlines', type: 'singlestop', route: 'HKG - SIN - FRA', config: '1-2-1', bestAircraft: 'A380 / A350-900', product: 'Business Class', doors: false, path: [[22.3080, 113.9185], [1.3644, 103.9915], [50.0379, 8.5622]], domain: 'singaporeair.com', alliance: 'Star Alliance', partners: ['Amex', 'Capital One', 'Chase', 'Citi'] },
        { name: 'THAI', type: 'singlestop', route: 'HKG - BKK - FRA', config: '1-2-1', bestAircraft: 'A350-900 / 777-300ER', product: 'Royal Silk Class', doors: false, path: [[22.3080, 113.9185], [13.6900, 100.7501], [50.0379, 8.5622]], domain: 'thaiairways.com', alliance: 'Star Alliance', partners: [] },
        { name: 'Turkish Airlines', type: 'singlestop', route: 'HKG - IST - FRA', config: '1-2-1 / 2-3-2', bestAircraft: '787-9 / A350-900', product: 'Business Class', doors: true, path: [[22.3080, 113.9185], [41.2753, 28.7519], [50.0379, 8.5622]], domain: 'turkishairlines.com', alliance: 'Star Alliance', partners: ['Bilt', 'Capital One', 'Citi'] },
        { name: 'Vietnam Airlines', type: 'singlestop', route: 'HKG - SGN - FRA', config: '1-2-1', bestAircraft: 'A350-900 / 787-9', product: 'Business Class', doors: false, path: [[22.3080, 113.9185], [10.8188, 106.6520], [50.0379, 8.5622]], domain: 'vietnamairlines.com', alliance: 'SkyTeam', partners: [] }
      ];

      // Map Init
      const map = L.map('map', {
        zoomControl: false,
        attributionControl: false
      }).setView([38, 60], 3);

      tileLayer = L.tileLayer(getTileUrl(currentTheme), {
        maxZoom: 19
      }).addTo(map);

      // Draw routes
      const drawnPaths = new Map();
      
      airlines.forEach(a => {
        // Simple string key for paths
        const key = a.path.map(p => p.join(',')).join('|');
        if (!drawnPaths.has(key)) {
          drawnPaths.set(key, { path: a.path, airlines: [] });
        }
        drawnPaths.get(key).airlines.push(a.name);
      });

      drawnPaths.forEach(data => {
        const polyline = L.polyline(data.path, {
          color: 'var(--featured)',
          weight: 2,
          opacity: 0.6,
          className: 'flight-path'
        }).addTo(map);
        
        polyline.bindTooltip(data.airlines.join(', '), {
          sticky: true,
          className: 'route-tooltip'
        });

        // Hover effects
        polyline.on('mouseover', function(e) {
          this.setStyle({ weight: 4, opacity: 1 });
        });
        polyline.on('mouseout', function(e) {
          this.setStyle({ weight: 2, opacity: 0.6 });
        });

        // Click effect to scroll to card
        polyline.on('click', function(e) {
          const airlineId = 'card-' + data.airlines[0].toLowerCase().replace(/[^a-z0-9]+/g, '-');
          const element = document.getElementById(airlineId);
          if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            element.style.transition = 'box-shadow 0.3s ease';
            element.style.boxShadow = '0 0 0 2px var(--featured), var(--shadow-lg)';
            setTimeout(() => {
              element.style.boxShadow = '';
            }, 2000);
          }
        });
      });

      // Render Cards
      function createCard(a) {
        const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(a.name + ' business class')}`;
        const badgeClass = a.doors ? 'badge' : 'badge badge-no';
        const doorText = a.doors ? 'Privacy Doors' : 'No Doors';
        
        const logoImg = a.domain 
          ? `<img src="https://t3.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=http://${a.domain}&size=128" alt="${a.name} logo" style="width: 24px; height: 24px; border-radius: 4px;" />` 
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" /></svg>`;
          
        const allianceBadge = `<span class="badge badge-alliance">${a.alliance}</span>`;
        const aviosBadge = a.avios ? `<span class="badge badge-avios">Avios</span>` : '';
        const partnersBadges = a.partners && a.partners.length > 0 
          ? `<div class="partner-badges">${a.partners.map(p => `<span class="badge badge-partner">${p}</span>`).join('')}</div>`
          : '';

        const id = 'card-' + a.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');

        return `
          <a id="${id}" href="${url}" target="_blank" class="card">
            <div class="card-left">
              <div class="icon-wrap">
                ${logoImg}
              </div>
              <div class="card-content">
                <div class="card-title">
                  ${a.name}
                  ${allianceBadge}
                  ${aviosBadge}
                  <span class="${badgeClass}">${doorText}</span>
                </div>
                ${partnersBadges}
                <div class="card-details">
                  <div><strong>Route:</strong> ${a.route}</div>
                  <div><strong>Config:</strong> ${a.config}</div>
                  <div><strong>Best Aircraft:</strong> ${a.bestAircraft}</div>
                  <div><strong>Product:</strong> ${a.product}</div>
                </div>
              </div>
            </div>
            <div class="card-arrow">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </div>
          </a>
        `;
      }

      const nonstopContainer = document.getElementById('nonstop-list');
      const singlestopContainer = document.getElementById('singlestop-list');

      const nonstop = airlines.filter(a => a.type === 'nonstop');
      const singlestop = airlines.filter(a => a.type === 'singlestop').sort((a, b) => a.name.localeCompare(b.name));

      nonstopContainer.innerHTML = nonstop.map(createCard).join('');
      singlestopContainer.innerHTML = singlestop.map(createCard).join('');
    </script>
  </body>
</html>
